<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: "ATPix Documentation" }}</title>
    <link rel="stylesheet" href="{{ '/assets/docs-portal.css' | relative_url }}" />
  </head>
  <body data-baseurl="{{ site.baseurl }}">
    <div class="docs-shell" id="docs-shell">
      <aside class="docs-toc" id="docs-toc" aria-label="Table of contents">
        <h1 class="docs-toc-header">ATPix Docs</h1>
        {% include docs-toc.html %}
      </aside>
      <div
        class="docs-resizer"
        id="docs-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-controls="docs-toc docs-content"
        aria-valuemin="20"
        aria-valuemax="50"
        aria-valuenow="33"
        tabindex="0"
        title="Drag to resize columns"
      >
        <span class="docs-resizer-grip" aria-hidden="true"></span>
      </div>
      <main class="docs-content" id="docs-content">
        {{ content }}
      </main>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
      integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"
      integrity="sha384-rbtjAdnIQE/aQJGEgXrVUlMibdfTSa4PQju4HDhN3sR2PmaKFzhEafuePsl9H/9I"
      crossorigin="anonymous"
    ></script>
    <script src="{{ '/assets/docs-portal.js' | relative_url }}"></script>
  </body>
</html>
