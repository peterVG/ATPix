global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']

  - job_name: redpanda
    static_configs:
      - targets: ['redpanda:9644']

  - job_name: apps
    static_configs:
      - targets: []
        # Apps will be dynamically added or mapped here
